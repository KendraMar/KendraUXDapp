<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 
        Apollo Logo - Minimal Abstract Globe
        Works in single color, easily printable/embossable
    -->
    
    <!-- Main sphere outline -->
    <circle 
        cx="200" 
        cy="200" 
        r="160" 
        stroke="currentColor" 
        stroke-width="24" 
        fill="none"
    />
    
    <!-- Single sweeping arc - suggests horizon/curvature -->
    <path 
        d="M 60 260 
           Q 200 120, 340 260" 
        stroke="currentColor" 
        stroke-width="24" 
        stroke-linecap="round"
        fill="none"
    />
</svg>