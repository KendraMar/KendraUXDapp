<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 
        Apollo Logo Variant 10 - Crystal Heart
        Glowing crystalline structure with inner light
    -->
    
    <style>
        @keyframes crystalGlow {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        
        @keyframes crystalPulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.02); filter: brightness(1.2); }
        }
        
        @keyframes innerLight {
            0%, 100% { opacity: 0.6; r: 35; }
            50% { opacity: 0.9; r: 42; }
        }
        
        @keyframes facetShimmer {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        
        .crystal-main {
            animation: crystalPulse 4s ease-in-out infinite;
            transform-origin: 200px 200px;
        }
        
        .crystal-glow {
            animation: crystalGlow 3s ease-in-out infinite;
        }
        
        .inner-light {
            animation: innerLight 3s ease-in-out infinite;
        }
        
        .facet-shimmer {
            animation: facetShimmer 2s ease-in-out infinite;
        }
        
        .crystal-container:hover .crystal-main {
            animation-duration: 2s;
        }
        
        .crystal-container:hover .crystal-glow {
            animation-duration: 1.5s;
        }
        
        .crystal-container:hover .inner-light {
            animation-duration: 1.5s;
        }
    </style>
    
    <defs>
        <clipPath id="circleClipV10">
            <circle cx="200" cy="200" r="148"/>
        </clipPath>
        
        <filter id="crystalBlur" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
        </filter>
        
        <linearGradient id="crystalFace1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.7"/>
        </linearGradient>
        
        <linearGradient id="crystalFace2" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#6366f1" stop-opacity="0.6"/>
        </linearGradient>
        
        <linearGradient id="crystalFace3" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0.5"/>
        </linearGradient>
        
        <radialGradient id="crystalCore" cx="50%" cy="40%" r="50%">
            <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
            <stop offset="50%" stop-color="#c4b5fd" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
        </radialGradient>
        
        <radialGradient id="crystalBg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1e1b4b"/>
            <stop offset="100%" stop-color="#0c0a1d"/>
        </radialGradient>
    </defs>
    
    <g class="crystal-container">
        <circle cx="200" cy="200" r="160" stroke="currentColor" stroke-width="24" fill="none"/>
        
        <g clip-path="url(#circleClipV10)">
            <circle cx="200" cy="200" r="148" fill="url(#crystalBg)"/>
            
            <!-- Outer glow -->
            <g filter="url(#crystalBlur)" class="crystal-glow">
                <polygon points="200,80 280,160 280,260 200,320 120,260 120,160" fill="#8b5cf6" opacity="0.4"/>
            </g>
            
            <!-- Crystal structure -->
            <g class="crystal-main">
                <!-- Back faces -->
                <polygon points="200,80 120,160 120,260 200,200" fill="url(#crystalFace2)" opacity="0.7"/>
                <polygon points="200,80 280,160 280,260 200,200" fill="url(#crystalFace1)" opacity="0.8"/>
                
                <!-- Front faces -->
                <polygon points="200,320 120,260 200,200" fill="url(#crystalFace2)" opacity="0.9"/>
                <polygon points="200,320 280,260 200,200" fill="url(#crystalFace1)" opacity="0.85"/>
                
                <!-- Top facet -->
                <polygon points="200,80 160,120 200,140 240,120" fill="url(#crystalFace3)" class="facet-shimmer"/>
                
                <!-- Edge highlights -->
                <line x1="200" y1="80" x2="200" y2="200" stroke="#e0e7ff" stroke-width="1" opacity="0.6"/>
                <line x1="200" y1="200" x2="200" y2="320" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>
                <line x1="120" y1="160" x2="280" y2="160" stroke="#e0e7ff" stroke-width="1" opacity="0.4"/>
                <line x1="120" y1="260" x2="280" y2="260" stroke="#a5b4fc" stroke-width="1" opacity="0.3"/>
            </g>
            
            <!-- Inner glow -->
            <circle class="inner-light" cx="200" cy="180" r="35" fill="url(#crystalCore)" filter="url(#crystalBlur)"/>
            <circle cx="200" cy="175" r="12" fill="#fff" opacity="0.8"/>
            <circle cx="195" cy="170" r="4" fill="#fff"/>
        </g>
    </g>
</svg>