<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 
        Apollo Logo Variant 3 - Flowing Waves
        Layered wave patterns suggesting depth and motion
    -->
    
    <defs>
        <clipPath id="circleClipV3">
            <circle cx="200" cy="200" r="148"/>
        </clipPath>
        <linearGradient id="wave1" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#312e81"/>
            <stop offset="100%" stop-color="#4338ca"/>
        </linearGradient>
        <linearGradient id="wave2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#4f46e5"/>
            <stop offset="100%" stop-color="#6366f1"/>
        </linearGradient>
        <linearGradient id="wave3" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#818cf8"/>
            <stop offset="100%" stop-color="#a5b4fc"/>
        </linearGradient>
    </defs>
    
    <!-- Main sphere outline -->
    <circle 
        cx="200" 
        cy="200" 
        r="160" 
        stroke="currentColor" 
        stroke-width="24" 
        fill="none"
    />
    
    <!-- Internal wave pattern -->
    <g clip-path="url(#circleClipV3)">
        <!-- Background -->
        <rect x="40" y="40" width="320" height="320" fill="url(#wave1)"/>
        
        <!-- Back wave -->
        <path 
            d="M 40 280
               Q 120 240, 200 260
               T 360 240
               L 360 360 L 40 360 Z"
            fill="url(#wave2)"
            opacity="0.9"
        />
        
        <!-- Middle wave -->
        <path 
            d="M 40 300
               Q 140 260, 220 290
               T 360 270
               L 360 360 L 40 360 Z"
            fill="url(#wave3)"
            opacity="0.85"
        />
        
        <!-- Front wave -->
        <path 
            d="M 40 330
               Q 100 300, 180 320
               T 360 310
               L 360 360 L 40 360 Z"
            fill="#c7d2fe"
            opacity="0.8"
        />
        
        <!-- Floating orb accent -->
        <circle cx="200" cy="180" r="35" fill="#e0e7ff" opacity="0.4"/>
        <circle cx="200" cy="180" r="20" fill="#f5f3ff" opacity="0.6"/>
    </g>
</svg>