<svg width="180" height="180" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Apollo Logo - Apple Touch Icon -->
    
    <!-- Solid background for iOS -->
    <rect width="400" height="400" rx="80" fill="#1b1d21"/>
    
    <!-- Main sphere outline -->
    <circle 
        cx="200" 
        cy="200" 
        r="130" 
        stroke="#0066CC" 
        stroke-width="26" 
        fill="none"
    />
    
    <!-- Single sweeping arc - suggests horizon/curvature -->
    <path 
        d="M 85 240 Q 200 130, 315 240" 
        stroke="#0066CC" 
        stroke-width="26" 
        stroke-linecap="round"
        fill="none"
    />
</svg>
