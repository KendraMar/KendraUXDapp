<!DOCTYPE html>
<html lang="en" class="pf-v6-theme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <% if (typeof basePath !== 'undefined' && basePath && basePath !== '/') { %><base href="<%= basePath %>"><% } %>
  <title>KendraUXDapp</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="<%= (typeof basePath !== 'undefined' ? basePath : '/') %>favicon.svg">
  <link rel="icon" type="image/x-icon" href="<%= (typeof basePath !== 'undefined' ? basePath : '/') %>favicon.ico">
  
  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="<%= (typeof basePath !== 'undefined' ? basePath : '/') %>apple-touch-icon.svg">
  
  <!-- Web Manifest -->
  <link rel="manifest" href="<%= (typeof basePath !== 'undefined' ? basePath : '/') %>site.webmanifest">
  
  <!-- Theme color for browser chrome -->
  <meta name="theme-color" content="#0066CC">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KendraUXDapp">
  
  <!-- Description for SEO/sharing -->
  <meta name="description" content="KendraUXDapp - Integrated Design Environment for aggregating context and augmenting design workflows">
</head>
<body>
  <div id="root"></div>
</body>
</html>
