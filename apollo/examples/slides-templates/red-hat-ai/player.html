<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Hat AI Presentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@300;400;500;600;700;900&family=Red+Hat+Text:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Red Hat Text', sans-serif; background: #000; }
    
    .slide-container { 
      position: relative; 
      width: 100%; 
      height: 100%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      background: #000; 
    }
    
    .slide-viewport { 
      position: relative; 
      background: #fff; 
      overflow: hidden; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.5); 
    }
    
    .slide { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      opacity: 0; 
      visibility: hidden; 
      transition: opacity 0.4s ease; 
      display: flex; 
      flex-direction: column; 
    }
    
    .slide.active { opacity: 1; visibility: visible; }
    
    /* ===== TITLE SLIDE ===== */
    .slide.slide-title { 
      background: #151515; 
      color: #fff; 
      position: relative; 
      overflow: hidden; 
    }
    
    .slide.slide-title .title-content { 
      position: relative; 
      z-index: 1; 
      padding: 8% 6%; 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
    }
    
    .slide.slide-title h1 { 
      font-family: 'Red Hat Display', sans-serif; 
      font-size: 4.5vw; 
      font-weight: 700; 
      line-height: 1.1; 
      margin-bottom: 0.5em; 
      max-width: 70%; 
    }
    
    .slide.slide-title h2 { 
      font-family: 'Red Hat Text', sans-serif; 
      font-size: 1.8vw; 
      font-weight: 400; 
      color: rgba(255,255,255,0.7); 
    }
    
    .slide.slide-title .slide-number {
      position: absolute;
      bottom: 5%;
      left: 6%;
      font-family: 'Red Hat Display', sans-serif;
      font-size: 5vw;
      font-weight: 700;
      color: rgba(255,255,255,0.15);
    }
    
    /* ===== CONTENT SLIDE ===== */
    .slide.slide-content { background: #fff; color: #151515; }
    
    .slide.slide-content .slide-header { 
      padding: 3% 5%; 
      display: flex;
      align-items: center;
    }
    
    .slide.slide-content .slide-header::before { 
      content: ''; 
      display: inline-block; 
      width: 30px; 
      height: 2px; 
      background: #EE0000; 
      margin-right: 12px; 
    }
    
    .slide.slide-content .slide-header .section-title { 
      font-family: 'Red Hat Text', sans-serif; 
      font-size: 1vw; 
      font-weight: 500; 
      color: #EE0000; 
    }
    
    .slide.slide-content .slide-body { 
      flex: 1; 
      padding: 0 5% 5%; 
    }
    
    .slide.slide-content h1 { 
      font-family: 'Red Hat Display', sans-serif; 
      font-size: 3.5vw; 
      font-weight: 700; 
      color: #151515; 
      margin-bottom: 0.8em; 
      line-height: 1.1; 
    }
    
    .slide.slide-content h3 { 
      font-family: 'Red Hat Display', sans-serif; 
      font-size: 1.4vw; 
      font-weight: 600; 
      color: #151515; 
      margin: 1.2em 0 0.6em; 
    }
    
    .slide.slide-content p { 
      font-family: 'Red Hat Text', sans-serif; 
      font-size: 1.3vw; 
      line-height: 1.6; 
      color: #151515; 
      margin-bottom: 0.8em; 
    }
    
    .slide.slide-content ul { list-style: none; padding: 0; margin: 0.8em 0; }
    
    .slide.slide-content ul li { 
      font-family: 'Red Hat Text', sans-serif; 
      font-size: 1.3vw; 
      line-height: 1.6; 
      padding-left: 1.5em; 
      position: relative; 
      margin-bottom: 0.5em; 
    }
    
    .slide.slide-content ul li::before { 
      content: '▸'; 
      position: absolute; 
      left: 0; 
      top: 0; 
      color: #EE0000; 
      font-weight: bold;
    }
    
    .slide.slide-content .source {
      position: absolute;
      bottom: 5%;
      left: 5%;
      font-family: 'Red Hat Text', sans-serif;
      font-size: 0.8vw;
      color: #6A6E73;
    }
    
    .slide.slide-content blockquote { 
      border-left: 4px solid #EE0000; 
      padding-left: 1em; 
      margin: 1em 0; 
      font-style: italic; 
      color: #6A6E73; 
    }
    
    .page-number { 
      position: absolute; 
      bottom: 5%; 
      right: 5%; 
      font-family: 'Red Hat Display', sans-serif; 
      font-size: 2.5vw; 
      font-weight: 700;
      color: rgba(0,0,0,0.08); 
    }
    
    /* ===== SECTION SLIDE ===== */
    .slide.slide-section { 
      background: linear-gradient(135deg, #151515 0%, #1a1a1a 100%); 
      color: #fff; 
      justify-content: center; 
      align-items: flex-start; 
      padding: 8% 6%;
    }
    
    .slide.slide-section h1 { 
      font-family: 'Red Hat Display', sans-serif; 
      font-size: 4vw; 
      font-weight: 700;
      line-height: 1.2;
    }
    
    .slide.slide-section h2 { 
      font-family: 'Red Hat Text', sans-serif; 
      font-size: 1.8vw; 
      font-weight: 400; 
      color: rgba(255,255,255,0.6); 
      margin-top: 0.5em; 
    }
    
    .slide.slide-section .slide-number {
      position: absolute;
      bottom: 5%;
      left: 6%;
      font-family: 'Red Hat Display', sans-serif;
      font-size: 5vw;
      font-weight: 700;
      color: rgba(255,255,255,0.1);
    }
    
    /* ===== THREE COLUMN SLIDE ===== */
    .slide.slide-three-column { background: #fff; color: #151515; }
    
    .slide.slide-three-column .slide-header { 
      padding: 3% 5%; 
      display: flex;
      align-items: center;
    }
    
    .slide.slide-three-column .slide-header::before { 
      content: ''; 
      display: inline-block; 
      width: 30px; 
      height: 2px; 
      background: #EE0000; 
      margin-right: 12px; 
    }
    
    .slide.slide-three-column .slide-header .section-title { 
      font-family: 'Red Hat Text', sans-serif; 
      font-size: 1vw; 
      font-weight: 500; 
      color: #EE0000; 
    }
    
    .slide.slide-three-column .slide-body { 
      flex: 1; 
      padding: 0 5% 5%;
      display: flex;
      flex-direction: column;
    }
    
    .slide.slide-three-column h1 { 
      font-family: 'Red Hat Display', sans-serif; 
      font-size: 2.8vw; 
      font-weight: 700; 
      color: #151515; 
      margin-bottom: 1em; 
      line-height: 1.2; 
    }
    
    .slide.slide-three-column .columns {
      display: flex;
      gap: 4%;
      flex: 1;
    }
    
    .slide.slide-three-column .column {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .slide.slide-three-column .column-title {
      font-family: 'Red Hat Display', sans-serif;
      font-size: 1.4vw;
      font-weight: 600;
      color: #151515;
      margin-bottom: 0.8em;
      padding-bottom: 0.5em;
      border-bottom: 2px solid #EE0000;
    }
    
    .slide.slide-three-column .column-content {
      font-family: 'Red Hat Text', sans-serif;
      font-size: 1.1vw;
      line-height: 1.6;
      color: #4A4A4A;
    }
    
    .slide.slide-three-column .column ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    .slide.slide-three-column .column li {
      font-family: 'Red Hat Text', sans-serif;
      font-size: 1.1vw;
      line-height: 1.5;
      padding-left: 1.2em;
      position: relative;
      margin-bottom: 0.4em;
    }
    
    .slide.slide-three-column .column li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: #EE0000;
    }
    
    /* ===== CASE STUDY SLIDE ===== */
    .slide.slide-case-study { background: #fff; color: #151515; }
    
    .slide.slide-case-study .slide-header { 
      padding: 3% 5%; 
      display: flex;
      align-items: center;
    }
    
    .slide.slide-case-study .slide-header::before { 
      content: ''; 
      display: inline-block; 
      width: 30px; 
      height: 2px; 
      background: #EE0000; 
      margin-right: 12px; 
    }
    
    .slide.slide-case-study .slide-header .section-title { 
      font-family: 'Red Hat Text', sans-serif; 
      font-size: 1vw; 
      font-weight: 500; 
      color: #EE0000; 
    }
    
    .slide.slide-case-study .slide-body { 
      flex: 1; 
      padding: 0 5% 5%;
      display: flex;
      gap: 4%;
    }
    
    .slide.slide-case-study .case-content {
      flex: 1;
    }
    
    .slide.slide-case-study .case-sidebar {
      flex: 0 0 30%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2%;
      background: #f5f5f5;
      border-radius: 8px;
    }
    
    .slide.slide-case-study .case-sidebar .company-label {
      font-family: 'Red Hat Text', sans-serif;
      font-size: 0.9vw;
      color: #6A6E73;
      margin-bottom: 0.5em;
    }
    
    .slide.slide-case-study .case-sidebar .company-name {
      font-family: 'Red Hat Display', sans-serif;
      font-size: 1.6vw;
      font-weight: 700;
      color: #151515;
      text-align: center;
    }
    
    .slide.slide-case-study h1 { 
      font-family: 'Red Hat Display', sans-serif; 
      font-size: 2.5vw; 
      font-weight: 700; 
      color: #151515; 
      margin-bottom: 1em; 
      line-height: 1.2; 
    }
    
    .slide.slide-case-study .case-section {
      margin-bottom: 1.5em;
    }
    
    .slide.slide-case-study .case-section-title {
      font-family: 'Red Hat Display', sans-serif;
      font-size: 1.3vw;
      font-weight: 600;
      color: #EE0000;
      margin-bottom: 0.5em;
    }
    
    .slide.slide-case-study .case-section p {
      font-family: 'Red Hat Text', sans-serif;
      font-size: 1.1vw;
      line-height: 1.6;
      color: #4A4A4A;
    }
    
    .slide.slide-case-study .case-result {
      background: #151515;
      color: #fff;
      padding: 1em 1.5em;
      border-radius: 6px;
      margin-top: 1em;
    }
    
    .slide.slide-case-study .case-result p {
      font-family: 'Red Hat Display', sans-serif;
      font-size: 1.2vw;
      font-weight: 600;
      color: #fff;
      margin: 0;
    }
    
    /* ===== STACK SLIDE ===== */
    .slide.slide-stack { background: #fff; color: #151515; }
    
    .slide.slide-stack .slide-header { 
      padding: 3% 5%; 
      display: flex;
      align-items: center;
    }
    
    .slide.slide-stack .slide-header::before { 
      content: ''; 
      display: inline-block; 
      width: 30px; 
      height: 2px; 
      background: #EE0000; 
      margin-right: 12px; 
    }
    
    .slide.slide-stack .slide-header .section-title { 
      font-family: 'Red Hat Text', sans-serif; 
      font-size: 1vw; 
      font-weight: 500; 
      color: #EE0000; 
    }
    
    .slide.slide-stack .slide-body { 
      flex: 1; 
      padding: 0 5% 5%;
    }
    
    .slide.slide-stack h1 { 
      font-family: 'Red Hat Display', sans-serif; 
      font-size: 2.5vw; 
      font-weight: 700; 
      color: #151515; 
      margin-bottom: 0.5em; 
      line-height: 1.2; 
    }
    
    .slide.slide-stack .stack-subtitle {
      font-family: 'Red Hat Text', sans-serif;
      font-size: 1.2vw;
      color: #6A6E73;
      margin-bottom: 1.5em;
    }
    
    .slide.slide-stack .stack-layers {
      display: flex;
      flex-direction: column;
      gap: 0.5em;
    }
    
    .slide.slide-stack .stack-layer {
      display: flex;
      align-items: stretch;
      gap: 0.5em;
    }
    
    .slide.slide-stack .stack-layer-label {
      flex: 0 0 15%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 1em;
      font-family: 'Red Hat Text', sans-serif;
      font-size: 1vw;
      color: #6A6E73;
    }
    
    .slide.slide-stack .stack-layer-boxes {
      flex: 1;
      display: flex;
      gap: 0.3em;
    }
    
    .slide.slide-stack .stack-box {
      flex: 1;
      background: #151515;
      color: #fff;
      padding: 1em;
      text-align: center;
      font-family: 'Red Hat Display', sans-serif;
      font-size: 1vw;
      font-weight: 500;
      border-radius: 4px;
    }
    
    .slide.slide-stack .stack-box.red {
      background: #EE0000;
    }
    
    .slide.slide-stack .stack-box.gray {
      background: #6A6E73;
    }
    
    .slide.slide-stack .stack-box.light {
      background: #f0f0f0;
      color: #151515;
    }
    
    /* ===== THANK YOU SLIDE ===== */
    .slide.slide-thank-you { 
      background: #151515; 
      color: #fff; 
      position: relative;
      padding: 8% 6%;
    }
    
    .slide.slide-thank-you h1 { 
      font-family: 'Red Hat Display', sans-serif; 
      font-size: 5vw; 
      font-weight: 700;
      margin-bottom: 1em;
    }
    
    .slide.slide-thank-you .tagline {
      font-family: 'Red Hat Text', sans-serif;
      font-size: 1.4vw;
      color: rgba(255,255,255,0.8);
      max-width: 60%;
      line-height: 1.6;
      margin-bottom: 2em;
    }
    
    .slide.slide-thank-you .social-links {
      display: flex;
      flex-direction: column;
      gap: 0.5em;
    }
    
    .slide.slide-thank-you .social-link {
      font-family: 'Red Hat Text', sans-serif;
      font-size: 1vw;
      color: rgba(255,255,255,0.6);
    }
    
    .slide.slide-thank-you .logo {
      position: absolute;
      bottom: 8%;
      right: 6%;
      font-family: 'Red Hat Display', sans-serif;
      font-size: 2vw;
      font-weight: 700;
      color: #EE0000;
    }
    
    /* ===== TWO COLUMN LAYOUT FOR CONTENT SLIDES ===== */
    .slide.slide-content.has-media .slide-body {
      display: flex;
      gap: 3%;
    }
    
    .slide.slide-content.has-media .slide-text-column {
      flex: 1 1 45%;
      min-width: 0;
    }
    
    .slide.slide-content.has-media .slide-media-column {
      flex: 1 1 52%;
      display: flex;
      align-items: stretch;
      justify-content: center;
      min-width: 0;
    }
    
    .slide.slide-content.has-media .slide-media-column img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    
    .slide.slide-content.has-media .slide-media-column iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      background: #f5f5f5;
    }
    
    /* ===== NAVIGATION CONTROLS ===== */
    .nav-controls { 
      position: absolute; 
      bottom: 3%; 
      left: 50%; 
      transform: translateX(-50%); 
      display: flex; 
      align-items: center; 
      gap: 20px; 
      z-index: 100; 
      opacity: 0; 
      transition: opacity 0.3s ease; 
    }
    
    .slide-container:hover .nav-controls { opacity: 1; }
    
    .nav-btn { 
      width: 44px; 
      height: 44px; 
      border: none; 
      background: rgba(0,0,0,0.6); 
      color: #fff; 
      border-radius: 50%; 
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      transition: all 0.2s ease; 
    }
    
    .nav-btn:hover { background: #EE0000; transform: scale(1.1); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-btn:disabled:hover { background: rgba(0,0,0,0.6); transform: none; }
    .nav-btn svg { width: 20px; height: 20px; }
    
    .slide-counter { 
      font-family: 'Red Hat Text', sans-serif; 
      font-size: 14px; 
      color: #fff; 
      background: rgba(0,0,0,0.6); 
      padding: 8px 16px; 
      border-radius: 20px; 
    }
  </style>
</head>
<body>
  <div class="slide-container" id="slideContainer">
    <div class="slide-viewport" id="slideViewport"></div>
    <div class="nav-controls">
      <button class="nav-btn" id="prevBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <span class="slide-counter" id="slideCounter">1 / 1</span>
      <button class="nav-btn" id="nextBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
    </div>
  </div>
  
  <script>
    /* SLIDE_DATA_PLACEHOLDER */
    
    (function() {
      const data = window.SLIDE_DATA || { slides: [], aspectRatio: '16:9', title: 'Red Hat AI' };
      const slides = data.slides || [];
      const aspectRatio = data.aspectRatio || '16:9';
      const sectionTitle = data.title || 'Red Hat AI';
      let currentSlide = 0;
      
      const viewport = document.getElementById('slideViewport');
      const container = document.getElementById('slideContainer');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const counter = document.getElementById('slideCounter');
      
      function getAspectRatio() { 
        const parts = aspectRatio.split(':').map(Number); 
        return parts[0] / parts[1]; 
      }
      
      function resizeViewport() {
        const ratio = getAspectRatio();
        const containerWidth = container.clientWidth;
        const containerHeight = container.clientHeight;
        const containerRatio = containerWidth / containerHeight;
        let width, height;
        if (containerRatio > ratio) { 
          height = containerHeight * 0.9; 
          width = height * ratio; 
        } else { 
          width = containerWidth * 0.9; 
          height = width / ratio; 
        }
        viewport.style.width = width + 'px';
        viewport.style.height = height + 'px';
      }
      
      function parseInlineMarkdown(text) {
        if (!text) return '';
        return text
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/`(.+?)`/g, '<code>$1</code>');
      }
      
      function renderSlide(slide, index) {
        const slideEl = document.createElement('div');
        const slideType = slide.type || 'content';
        slideEl.className = 'slide slide-' + slideType;
        slideEl.dataset.index = index;
        
        if (slideType === 'title') {
          slideEl.innerHTML = 
            '<div class="title-content">' +
              '<h1>' + parseInlineMarkdown(slide.heading) + '</h1>' + 
              (slide.subheading ? '<h2>' + parseInlineMarkdown(slide.subheading) + '</h2>' : '') + 
            '</div>' +
            '<div class="slide-number">' + (index + 1) + '</div>';
            
        } else if (slideType === 'section') {
          slideEl.innerHTML = 
            '<h1>' + parseInlineMarkdown(slide.heading) + '</h1>' + 
            (slide.subheading ? '<h2>' + parseInlineMarkdown(slide.subheading) + '</h2>' : '') +
            '<div class="slide-number">' + (index + 1) + '</div>';
            
        } else if (slideType === 'three-column') {
          let columnsHtml = '<div class="columns">';
          const columns = slide.columns || [];
          
          for (const col of columns) {
            let colContentHtml = '';
            if (col.items && col.items.length > 0) {
              colContentHtml = '<ul>' + col.items.map(item => '<li>' + parseInlineMarkdown(item) + '</li>').join('') + '</ul>';
            } else if (col.text) {
              colContentHtml = '<div class="column-content">' + parseInlineMarkdown(col.text) + '</div>';
            }
            
            columnsHtml += 
              '<div class="column">' +
                '<div class="column-title">' + parseInlineMarkdown(col.title || '') + '</div>' +
                colContentHtml +
              '</div>';
          }
          columnsHtml += '</div>';
          
          slideEl.innerHTML = 
            '<div class="slide-header"><span class="section-title">' + sectionTitle + '</span></div>' +
            '<div class="slide-body">' +
              '<h1>' + parseInlineMarkdown(slide.heading) + '</h1>' + 
              columnsHtml +
            '</div>' +
            '<div class="page-number">' + (index + 1) + '</div>';
            
        } else if (slideType === 'case-study') {
          let sectionsHtml = '';
          
          if (slide.challenge) {
            sectionsHtml += 
              '<div class="case-section">' +
                '<div class="case-section-title">Challenge</div>' +
                '<p>' + parseInlineMarkdown(slide.challenge) + '</p>' +
              '</div>';
          }
          
          if (slide.solution) {
            sectionsHtml += 
              '<div class="case-section">' +
                '<div class="case-section-title">Solution</div>' +
                '<p>' + parseInlineMarkdown(slide.solution) + '</p>' +
              '</div>';
          }
          
          if (slide.result) {
            sectionsHtml += 
              '<div class="case-result">' +
                '<p>' + parseInlineMarkdown(slide.result) + '</p>' +
              '</div>';
          }
          
          let sidebarHtml = '';
          if (slide.company) {
            sidebarHtml = 
              '<div class="case-sidebar">' +
                '<div class="company-label">' + (slide.companyLabel || 'Customer') + '</div>' +
                '<div class="company-name">' + parseInlineMarkdown(slide.company) + '</div>' +
              '</div>';
          }
          
          slideEl.innerHTML = 
            '<div class="slide-header"><span class="section-title">' + sectionTitle + '</span></div>' +
            '<div class="slide-body">' +
              '<div class="case-content">' +
                '<h1>' + parseInlineMarkdown(slide.heading) + '</h1>' + 
                sectionsHtml +
              '</div>' +
              sidebarHtml +
            '</div>' +
            '<div class="page-number">' + (index + 1) + '</div>';
            
        } else if (slideType === 'stack') {
          let layersHtml = '<div class="stack-layers">';
          const layers = slide.layers || [];
          
          for (const layer of layers) {
            let boxesHtml = '<div class="stack-layer-boxes">';
            const boxes = layer.boxes || [];
            
            for (const box of boxes) {
              const boxClass = box.style ? ' ' + box.style : '';
              boxesHtml += '<div class="stack-box' + boxClass + '">' + parseInlineMarkdown(box.text || box) + '</div>';
            }
            boxesHtml += '</div>';
            
            layersHtml += 
              '<div class="stack-layer">' +
                '<div class="stack-layer-label">' + parseInlineMarkdown(layer.label || '') + '</div>' +
                boxesHtml +
              '</div>';
          }
          layersHtml += '</div>';
          
          slideEl.innerHTML = 
            '<div class="slide-header"><span class="section-title">' + sectionTitle + '</span></div>' +
            '<div class="slide-body">' +
              '<h1>' + parseInlineMarkdown(slide.heading) + '</h1>' + 
              (slide.subheading ? '<div class="stack-subtitle">' + parseInlineMarkdown(slide.subheading) + '</div>' : '') +
              layersHtml +
            '</div>' +
            '<div class="page-number">' + (index + 1) + '</div>';
            
        } else if (slideType === 'thank-you') {
          let socialHtml = '';
          if (slide.social && slide.social.length > 0) {
            socialHtml = '<div class="social-links">' + 
              slide.social.map(s => '<div class="social-link">' + parseInlineMarkdown(s) + '</div>').join('') +
              '</div>';
          }
          
          slideEl.innerHTML = 
            '<h1>' + parseInlineMarkdown(slide.heading || 'Thank you') + '</h1>' + 
            (slide.tagline ? '<div class="tagline">' + parseInlineMarkdown(slide.tagline) + '</div>' : '') +
            socialHtml +
            '<div class="logo">Red Hat</div>';
            
        } else {
          // Default content slide
          let contentHtml = '';
          const content = slide.content || [];
          const hasMedia = slide.media && slide.media.src;
          
          for (const item of content) {
            switch (item.type) {
              case 'h3': 
                contentHtml += '<h3>' + parseInlineMarkdown(item.text) + '</h3>'; 
                break;
              case 'paragraph': 
                contentHtml += '<p>' + parseInlineMarkdown(item.text) + '</p>'; 
                break;
              case 'bullet': 
                contentHtml += '<li>' + parseInlineMarkdown(item.text) + '</li>'; 
                break;
              case 'quote': 
                contentHtml += '<blockquote>' + parseInlineMarkdown(item.text) + '</blockquote>'; 
                break;
              case 'image': 
                contentHtml += '<img src="' + item.src + '" alt="' + (item.alt || '') + '" style="max-width:100%;"/>'; 
                break;
            }
          }
          
          // Wrap consecutive li elements in ul
          contentHtml = contentHtml.replace(/(<li>.*?<\/li>)+/g, '<ul>$&</ul>');
          
          // Add has-media class if slide has side panel media
          if (hasMedia) {
            slideEl.classList.add('has-media');
          }
          
          // Build media column HTML if present
          let mediaHtml = '';
          if (hasMedia) {
            if (slide.media.type === 'image') {
              mediaHtml = '<div class="slide-media-column"><img src="' + slide.media.src + '" alt="Slide visual" /></div>';
            } else if (slide.media.type === 'iframe') {
              mediaHtml = '<div class="slide-media-column"><iframe src="' + slide.media.src + '" title="Slide content"></iframe></div>';
            }
          }
          
          // Build source citation if present
          let sourceHtml = '';
          if (slide.source) {
            sourceHtml = '<div class="source">Source: ' + parseInlineMarkdown(slide.source) + '</div>';
          }
          
          // Build slide body - with or without two-column layout
          let bodyContent;
          if (hasMedia) {
            bodyContent = 
              '<div class="slide-text-column">' +
                '<h1>' + parseInlineMarkdown(slide.heading) + '</h1>' + 
                contentHtml + 
              '</div>' +
              mediaHtml;
          } else {
            bodyContent = '<h1>' + parseInlineMarkdown(slide.heading) + '</h1>' + contentHtml;
          }
          
          slideEl.innerHTML = 
            '<div class="slide-header"><span class="section-title">' + sectionTitle + '</span></div>' +
            '<div class="slide-body">' + bodyContent + '</div>' +
            sourceHtml +
            '<div class="page-number">' + (index + 1) + '</div>';
        }
        
        return slideEl;
      }
      
      function renderSlides() {
        viewport.innerHTML = '';
        
        if (slides.length === 0) { 
          viewport.innerHTML = '<div class="slide active" style="display:flex;align-items:center;justify-content:center;background:#151515;color:#fff;"><p>No slides to display</p></div>'; 
          return; 
        }
        
        slides.forEach((slide, index) => { 
          const slideEl = renderSlide(slide, index); 
          if (index === 0) slideEl.classList.add('active'); 
          viewport.appendChild(slideEl); 
        });
        
        updateCounter(); 
        updateButtons();
      }
      
      function goToSlide(index) {
        if (index < 0 || index >= slides.length) return;
        viewport.querySelectorAll('.slide').forEach((el, i) => { 
          el.classList.toggle('active', i === index); 
        });
        currentSlide = index; 
        updateCounter(); 
        updateButtons();
      }
      
      function next() { goToSlide(currentSlide + 1); }
      function prev() { goToSlide(currentSlide - 1); }
      
      function updateCounter() { 
        counter.textContent = (currentSlide + 1) + ' / ' + Math.max(slides.length, 1); 
      }
      
      function updateButtons() { 
        prevBtn.disabled = currentSlide === 0; 
        nextBtn.disabled = currentSlide === slides.length - 1; 
      }
      
      prevBtn.addEventListener('click', prev);
      nextBtn.addEventListener('click', next);
      
      document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === ' ') { 
          e.preventDefault(); 
          next(); 
        } else if (e.key === 'ArrowLeft') { 
          e.preventDefault(); 
          prev(); 
        }
      });

      // Mouse wheel to navigate between slides
      var lastWheelTime = 0;
      document.addEventListener('wheel', function(e) {
        e.preventDefault();
        var now = Date.now();
        if (now - lastWheelTime < 250) return;
        lastWheelTime = now;
        if (e.deltaY > 0) next();
        else if (e.deltaY < 0) prev();
      }, { passive: false });
      
      window.addEventListener('resize', resizeViewport);
      resizeViewport();
      renderSlides();
    })();
  </script>
</body>
</html>
