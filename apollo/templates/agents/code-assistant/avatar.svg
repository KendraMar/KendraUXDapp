<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 
        Apollo Logo Variant 5 - Plasma Orb
        Smoother, more ethereal lava lamp effect
        Uses filter effects for softer edges
    -->
    
    <style>
        @keyframes plasmaFlow1 {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(15px, -10px) scale(1.1);
            }
            50% {
                transform: translate(-10px, 15px) scale(0.95);
            }
            75% {
                transform: translate(10px, 10px) scale(1.05);
            }
        }
        
        @keyframes plasmaFlow2 {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(-15px, 10px) scale(1.08);
            }
            66% {
                transform: translate(10px, -15px) scale(0.92);
            }
        }
        
        @keyframes plasmaFlow3 {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            50% {
                transform: translate(8px, -8px) rotate(10deg);
            }
        }
        
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.85; }
        }
        
        @keyframes colorCycle1 {
            0%, 100% { stop-color: #6366f1; }
            33% { stop-color: #8b5cf6; }
            66% { stop-color: #a855f7; }
        }
        
        @keyframes colorCycle2 {
            0%, 100% { stop-color: #a78bfa; }
            33% { stop-color: #c4b5fd; }
            66% { stop-color: #8b5cf6; }
        }
        
        .plasma-orb-1 {
            animation: plasmaFlow1 10s ease-in-out infinite;
            transform-origin: center;
        }
        
        .plasma-orb-2 {
            animation: plasmaFlow2 8s ease-in-out infinite;
            transform-origin: center;
        }
        
        .plasma-orb-3 {
            animation: plasmaFlow3 6s ease-in-out infinite;
            transform-origin: center;
        }
        
        .plasma-core {
            animation: pulseGlow 4s ease-in-out infinite;
        }
        
        .plasma-container:hover .hover-color-1 {
            animation: colorCycle1 3s ease-in-out infinite;
        }
        
        .plasma-container:hover .hover-color-2 {
            animation: colorCycle2 2.5s ease-in-out infinite;
        }
        
        .plasma-container:hover .plasma-orb-1 {
            animation: plasmaFlow1 5s ease-in-out infinite;
        }
        
        .plasma-container:hover .plasma-orb-2 {
            animation: plasmaFlow2 4s ease-in-out infinite;
        }
        
        .plasma-container:hover .plasma-orb-3 {
            animation: plasmaFlow3 3s ease-in-out infinite;
        }
    </style>
    
    <defs>
        <clipPath id="circleClipV5">
            <circle cx="200" cy="200" r="148"/>
        </clipPath>
        
        <!-- Blur filter for soft edges -->
        <filter id="plasmaBlur" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
        </filter>
        
        <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="15"/>
        </filter>
        
        <radialGradient id="plasmaGrad1" cx="40%" cy="40%" r="60%">
            <stop class="hover-color-1" offset="0%" stop-color="#6366f1"/>
            <stop offset="100%" stop-color="#4338ca" stop-opacity="0"/>
        </radialGradient>
        
        <radialGradient id="plasmaGrad2" cx="60%" cy="50%" r="50%">
            <stop class="hover-color-2" offset="0%" stop-color="#a78bfa"/>
            <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
        </radialGradient>
        
        <radialGradient id="plasmaGrad3" cx="50%" cy="60%" r="45%">
            <stop offset="0%" stop-color="#c4b5fd"/>
            <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
        </radialGradient>
        
        <radialGradient id="plasmaCore" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#f5f3ff" stop-opacity="0.9"/>
            <stop offset="40%" stop-color="#e0e7ff" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
        </radialGradient>
        
        <radialGradient id="plasmaBg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1e1b4b"/>
            <stop offset="70%" stop-color="#0f0a2e"/>
            <stop offset="100%" stop-color="#0c0720"/>
        </radialGradient>
    </defs>
    
    <g class="plasma-container">
        <!-- Main sphere outline -->
        <circle 
            cx="200" 
            cy="200" 
            r="160" 
            stroke="currentColor" 
            stroke-width="24" 
            fill="none"
        />
        
        <!-- Internal plasma effect -->
        <g clip-path="url(#circleClipV5)">
            <!-- Deep space background -->
            <circle cx="200" cy="200" r="148" fill="url(#plasmaBg)"/>
            
            <!-- Soft glowing orbs layer -->
            <g filter="url(#softGlow)">
                <ellipse 
                    class="plasma-orb-1"
                    cx="160" 
                    cy="180" 
                    rx="80" 
                    ry="70"
                    fill="url(#plasmaGrad1)"
                />
                <ellipse 
                    class="plasma-orb-2"
                    cx="240" 
                    cy="200" 
                    rx="70" 
                    ry="80"
                    fill="url(#plasmaGrad2)"
                />
            </g>
            
            <!-- Sharper definition layer -->
            <g filter="url(#plasmaBlur)">
                <ellipse 
                    class="plasma-orb-1"
                    cx="170" 
                    cy="190" 
                    rx="60" 
                    ry="50"
                    fill="url(#plasmaGrad1)"
                    opacity="0.8"
                />
                <ellipse 
                    class="plasma-orb-2"
                    cx="230" 
                    cy="210" 
                    rx="55" 
                    ry="60"
                    fill="url(#plasmaGrad2)"
                    opacity="0.7"
                />
                <ellipse 
                    class="plasma-orb-3"
                    cx="200" 
                    cy="240" 
                    rx="45" 
                    ry="40"
                    fill="url(#plasmaGrad3)"
                    opacity="0.75"
                />
            </g>
            
            <!-- Central glowing core -->
            <circle 
                class="plasma-core"
                cx="200" 
                cy="195" 
                r="40"
                fill="url(#plasmaCore)"
            />
            
            <!-- Top highlight reflection -->
            <ellipse 
                cx="175" 
                cy="145" 
                rx="25" 
                ry="15"
                fill="#f5f3ff"
                opacity="0.3"
            />
        </g>
    </g>
</svg>