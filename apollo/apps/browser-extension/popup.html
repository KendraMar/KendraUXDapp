<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apollo Capture</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Apollo Capture</h1>
    </header>
    
    <main>
      <div class="setting">
        <label class="toggle">
          <input type="checkbox" id="enabled" checked>
          <span class="toggle-slider"></span>
          <span class="toggle-label">Capture Enabled</span>
        </label>
      </div>
      
      <div class="setting">
        <label for="excludedDomains">Excluded Domains</label>
        <textarea id="excludedDomains" rows="4" placeholder="One domain per line"></textarea>
        <small>Pages on these domains won't be captured</small>
      </div>
      
      <div class="actions">
        <button id="saveBtn" class="btn-primary">Save Settings</button>
      </div>
      
      <div class="section">
        <h2>Recent History</h2>
        <div id="history" class="history-list">
          <p class="loading">Loading...</p>
        </div>
      </div>
      
      <div class="status" id="status"></div>
    </main>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
